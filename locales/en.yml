    creator_lounge_eyebrow: "Creator Lounge · creators only"
    quick_links: "Quick links"
    my_posts: "My posts"
    bookmarks: "Bookmarks"
    destinations: "Destinations"
    tags_suffix: "tags"
    enter: "Enter"
    featured_destinations: "Featured destinations"
    browse_all_destinations: "Browse all destinations"
    with_activity: "With Activity"
    all_destination_tags: "All destination tags"
    no_activity_yet: "No activity yet"
    topics:
      other: "%{count} topics"
    replies:
